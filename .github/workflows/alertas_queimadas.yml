name: Alertas de Queimadas

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitorar-queimadas:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Verificar arquivos
        run: |
          pwd
          ls -la
          ls -la data || true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar monitoramento
        env:
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          AREA_GEOJSON_PATH: data/area_monitorada.geojson
          ALERT_DB_PATH: data/alert_history.db
          BUFFER_KM: "10"
        run: python monitor_alertas.py

      - name: Salvar histórico de alertas
        run: |
          git config user.name "kwy-geomonitor-bot"
          git config user.email "kwy-geomonitor-bot@users.noreply.github.com"
          git add data/alert_history.db || true
          git commit -m "Atualiza histórico de alertas" || echo "Sem alterações no histórico"
          git push || echo "Nada para enviar"
